server {
    listen 80;
    server_name test.rowanlan.xyz;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name test.rowanlan.xyz;

    ssl_certificate /etc/letsencrypt/live/rowanlan.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rowanlan.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # PDF/PNG download — buffer response so gunicorn workers release immediately
    location ~ /api/procurement-batches/\d+/(pdf|png) {
        proxy_pass http://127.0.0.1:8601;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 8 128k;
        proxy_busy_buffers_size 256k;
    }

    location / {
        proxy_pass http://127.0.0.1:8601;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400;
    }

    client_max_body_size 20M;
}
