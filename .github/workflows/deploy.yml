name: CI/CD

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 语法检查
        run: |
          python -m py_compile app.py
          python -m py_compile i18n_backend.py
          for f in shared/*.py routes/*.py; do python -m py_compile "$f"; done
          echo "✅ 语法检查通过"
      - name: Schema 一致性检查
        run: python scripts/check_schema_consistency.py

  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Build web assets
        uses: actions/checkout@v4
        with:
          repository: ScottEX/snail-books-web
          ref: develop
          path: web-build
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: npm ci & build:web
        working-directory: web-build
        run: |
          npm ci
          npm run build:web

      - name: Snapshot backup (staging)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /opt/backups
            for db in /opt/snail-books-backend-staging/data/*.db; do
              [ -f "$db" ] || continue
              base=$(basename "$db" .db)
              cp "$db" "/opt/backups/snail-staging-${base}-$(date +%Y%m%d_%H%M%S).db"
              ls -t /opt/backups/snail-staging-${base}-*.db | tail -n +4 | xargs -r rm -f
            done

      - name: Clean stale web dist (staging)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: rm -rf /opt/snail-books-backend-staging/static/web-build/dist/*

      - name: Sync web dist → server backend/static (staging)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "web-build/dist/*"
          target: "/opt/snail-books-backend-staging/static/"
          strip_components: 0
          overwrite: true

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: ScottEX/snail-books-backend
          ref: develop
          path: backend

      - name: Clean stale backend files (staging)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            rm -f /opt/snail-books-backend-staging/app.py
            rm -f /opt/snail-books-backend-staging/i18n_backend.py
            rm -f /opt/snail-books-backend-staging/requirements.txt
            rm -rf /opt/snail-books-backend-staging/shared/
            rm -rf /opt/snail-books-backend-staging/routes/
            rm -rf /opt/snail-books-backend-staging/templates/

      - name: SCP backend code → staging
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "backend/requirements.txt,backend/app.py,backend/i18n_backend.py,backend/shared/*,backend/routes/*,backend/templates/**"
          target: "/opt/snail-books-backend-staging/"
          strip_components: 1

      - name: Deploy nginx config (staging)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "backend/deploy/nginx/test.rowanlan.xyz.conf"
          target: "/etc/nginx/sites-enabled/"
          strip_components: 3

      - name: Reload nginx (staging)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: nginx -t && systemctl reload nginx

      - name: Install deps & restart backend (staging)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            /opt/snail-books-backend-staging/venv/bin/pip install -r /opt/snail-books-backend-staging/requirements.txt
            systemctl restart snail-books-staging
            sleep 2
            systemctl is-active snail-books-staging
            curl -sSf -o /dev/null http://localhost:8601/ && echo "✅ Staging 冒烟测试通过" || { echo "❌ Staging 冒烟测试失败"; exit 1; }
            echo "✅ Staging 部署完成"

  deploy-production:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Build web assets
        uses: actions/checkout@v4
        with:
          repository: ScottEX/snail-books-web
          ref: main
          path: web-build
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: npm ci & build:web
        working-directory: web-build
        run: |
          npm ci
          npm run build:web

      - name: Snapshot backup (production)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /opt/backups
            for db in /opt/snail-books-backend/data/*.db; do
              [ -f "$db" ] || continue
              base=$(basename "$db" .db)
              cp "$db" "/opt/backups/snail-prod-${base}-$(date +%Y%m%d_%H%M%S).db"
              ls -t /opt/backups/snail-prod-${base}-*.db | tail -n +4 | xargs -r rm -f
            done

      - name: Clean stale web dist (production)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: rm -rf /opt/snail-books-backend/static/web-build/dist/*

      - name: Sync web dist → server backend/static (production)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "web-build/dist/*"
          target: "/opt/snail-books-backend/static/"
          strip_components: 0
          overwrite: true

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: ScottEX/snail-books-backend
          ref: main
          path: backend

      - name: Clean stale backend files (production)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            rm -f /opt/snail-books-backend/app.py
            rm -f /opt/snail-books-backend/i18n_backend.py
            rm -f /opt/snail-books-backend/requirements.txt
            rm -rf /opt/snail-books-backend/shared/
            rm -rf /opt/snail-books-backend/routes/
            rm -rf /opt/snail-books-backend/templates/

      - name: SCP backend code → production
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "backend/requirements.txt,backend/app.py,backend/i18n_backend.py,backend/shared/*,backend/routes/*,backend/templates/**"
          target: "/opt/snail-books-backend/"
          strip_components: 1

      - name: Install deps & restart backend (production)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            /opt/snail-books-backend/venv/bin/pip install -r /opt/snail-books-backend/requirements.txt
            systemctl restart snail-books
            sleep 2
            systemctl is-active snail-books
            curl -sSf -o /dev/null http://localhost:8600/ && echo "✅ 生产冒烟测试通过" || { echo "❌ 生产冒烟测试失败"; exit 1; }
            echo "✅ 生产部署完成"
