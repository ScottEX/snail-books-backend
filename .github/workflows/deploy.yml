name: CI/CD

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 语法检查
        run: |
          python -m py_compile app.py
          python -m py_compile i18n_backend.py
          echo "✅ 语法检查通过"
      - name: Jinja2 模板验证
        run: |
          pip install jinja2
          python -c "
          from jinja2 import Environment, FileSystemLoader, BaseLoader
          import glob, os
          # 验证所有 Python 文件可导入
          import py_compile
          for f in ['app.py', 'i18n_backend.py']:
              py_compile.compile(f, doraise=True)
          print('✅ 所有文件验证通过')
          "

  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: SSH 部署到测试服务器
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/snail-books-staging
            git checkout develop
            git pull origin develop
            systemctl restart snail-books-staging
            sleep 2
            systemctl is-active snail-books-staging
            echo "✅ Staging 部署完成"

  deploy-production:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH 部署到生产服务器
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/snail-books
            git checkout main
            git pull origin main
            systemctl restart snail-books
            sleep 2
            systemctl is-active snail-books
            echo "✅ 生产部署完成"
