name: CI/CD

on:
  push:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m py_compile app.py i18n_backend.py

  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 打包源码
        run: tar czf /tmp/source.tgz app.py i18n_backend.py static
      - name: 上传源码到 VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: /tmp/source.tgz
          target: /tmp/
          strip_components: 1
      - name: 解压并重启
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /opt/snail-books-backend-staging
            tar xzf /tmp/source.tgz
            rm /tmp/source.tgz
            systemctl restart snail-books-staging

  deploy-production:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: 打包源码
        run: tar czf /tmp/source.tgz app.py i18n_backend.py static
      - name: 上传源码到 VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: /tmp/source.tgz
          target: /tmp/
          strip_components: 1
      - name: 解压并重启
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /opt/snail-books-backend
            tar xzf /tmp/source.tgz
            rm /tmp/source.tgz
            systemctl restart snail-books
