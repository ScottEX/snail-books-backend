name: CI/CD

on:
  push:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m py_compile app.py i18n_backend.py

  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 部署并重启 (VPS git pull)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e
            cd /opt/snail-books-backend-staging || exit 1
            echo "=== fetching ==="
            git fetch https://github.com/ScottEX/snail-books-backend.git develop 2>&1
            echo "=== resetting ==="
            git reset --hard FETCH_HEAD
            echo "=== restarting ==="
            systemctl restart snail-books-staging
            echo "=== done ==="

  deploy-production:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: 部署并重启 (VPS git pull)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e
            cd /opt/snail-books-backend || exit 1
            git fetch https://github.com/ScottEX/snail-books-backend.git main 2>&1
            git reset --hard FETCH_HEAD
            systemctl restart snail-books
