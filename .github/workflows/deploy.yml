name: CI/CD

on:
  push:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m py_compile app.py i18n_backend.py

  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 准备部署文件
        run: |
          mkdir -p deploy
          cp app.py i18n_backend.py deploy/
          cp -r static deploy/ 2>/dev/null || true
      - name: 部署前端静态文件到测试服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: deploy/
          target: /opt/snail-books-backend-staging/
          strip_components: 1
      - name: 重启测试环境服务
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: systemctl restart snail-books-staging

  deploy-production:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: 准备部署文件
        run: |
          mkdir -p deploy
          cp app.py i18n_backend.py deploy/
          cp -r static deploy/ 2>/dev/null || true
      - name: 部署前端静态文件到生产服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: deploy/
          target: /opt/snail-books-backend/
          strip_components: 1
      - name: 重启生产环境服务
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: systemctl restart snail-books
