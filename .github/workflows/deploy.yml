name: CI/CD

on:
  push:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m py_compile app.py i18n_backend.py

  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 准备部署文件
        run: |
          mkdir -p deploy
          cp app.py i18n_backend.py deploy/
          cp -r static deploy/ 2>/dev/null || true
      - name: 部署到测试服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: deploy/
          target: /opt/snail-books-backend-staging/
          strip_components: 0
      - name: 移动文件并重启
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/snail-books-backend-staging/deploy
            cp -f app.py i18n_backend.py ../
            cp -rf static ../ 2>/dev/null || true
            cd .. && rm -rf deploy
            systemctl restart snail-books-staging

  deploy-production:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: 准备部署文件
        run: |
          mkdir -p deploy
          cp app.py i18n_backend.py deploy/
          cp -r static deploy/ 2>/dev/null || true
      - name: 部署到生产服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: deploy/
          target: /opt/snail-books-backend/
          strip_components: 0
      - name: 移动文件并重启
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/snail-books-backend/deploy
            cp -f app.py i18n_backend.py ../
            cp -rf static ../ 2>/dev/null || true
            cd .. && rm -rf deploy
            systemctl restart snail-books
