name: CI/CD

on:
  push:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m py_compile app.py i18n_backend.py

  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装 sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
      - name: 部署后端源码到测试服务器
        run: |
          sshpass -p '${{ secrets.SSH_PASSWORD }}' scp -o StrictHostKeyChecking=no \
            app.py i18n_backend.py \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/snail-books-backend-staging/
          sshpass -p '${{ secrets.SSH_PASSWORD }}' scp -o StrictHostKeyChecking=no -r \
            static \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/snail-books-backend-staging/
      - name: 重启测试环境服务
        run: |
          sshpass -p '${{ secrets.SSH_PASSWORD }}' ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            'systemctl restart snail-books-staging'

  deploy-production:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: 安装 sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
      - name: 部署后端源码到生产服务器
        run: |
          sshpass -p '${{ secrets.SSH_PASSWORD }}' scp -o StrictHostKeyChecking=no \
            app.py i18n_backend.py \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/snail-books-backend/
          sshpass -p '${{ secrets.SSH_PASSWORD }}' scp -o StrictHostKeyChecking=no -r \
            static \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/snail-books-backend/
      - name: 重启生产环境服务
        run: |
          sshpass -p '${{ secrets.SSH_PASSWORD }}' ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            'systemctl restart snail-books'
